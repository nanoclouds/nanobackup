# =============================================================================
# NanoBackup - Docker Compose para Deploy Self-Hosted
# =============================================================================
# Configuração completa para rodar o NanoBackup em container Docker
# =============================================================================

version: '3.8'

services:
  nanobackup:
    # Para build local, use:
    build:
      context: .
      dockerfile: Dockerfile
    
    # Ou para usar imagem do registry:
    # image: nanobackup:latest
    
    container_name: nanobackup
    restart: unless-stopped
    
    # Portas
    ports:
      - "3000:3000"
    
    # Variáveis de ambiente
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TZ=America/Sao_Paulo
      - TEMP_DIR=/tmp/backups
      - DIST_DIR=/app/dist
    
    # Volumes
    volumes:
      # Volume para backups temporários (opcional, para persistência)
      - nanobackup-temp:/tmp/backups
    
    # Limites de recursos (ajuste conforme necessário)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Volumes nomeados
volumes:
  nanobackup-temp:
    driver: local
